services:
  # ── Kafka (KRaft mode – no Zookeeper) ─────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - marketplace-net

  # ── Kafka UI (http://localhost:8088) ──────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - marketplace-net
  # ── API Gateway (http://localhost:8000) ──────────────────────────────────────
  api-gateway:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - identity-service
      - listing-service
      - order-service
      - compliance-service
    volumes:
      - ./services/api-gateway:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - PORT=8000
      - IDENTITY_URL=http://identity-service:8001
      - LISTING_URL=http://listing-service:8002
      - ORDER_URL=http://order-service:8003
      - COMPLIANCE_URL=http://compliance-service:8004
    networks:
      - marketplace-net
  # ── Topic pre-creator (runs once, exits) ─────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["bash", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-events --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-events --replication-factor 1 --partitions 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic listing-events --replication-factor 1 --partitions 1
        echo "All Kafka topics created successfully"
    networks:
      - marketplace-net

  identity-service:
    build: ./services/identity-service
    container_name: identity-service
    ports:
      - "8001:8001"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./services/identity-service:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - PORT=8001
      - JWT_SECRET=${JWT_SECRET}
      - COMPLIANCE_URL=http://compliance-service:8004
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=identity-service
      - SUPABASE_URL=https://plruuzubfulccriopggs.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - marketplace-net

  listing-service:
    build: ./services/listing-service
    container_name: listing-service
    ports:
      - "8002:8002"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./services/listing-service:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - PORT=8002
      - IDENTITY_URL=https://identity-service.blackmeadow-879b6e0b.southeastasia.azurecontainerapps.io
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=listing-service
      - SUPABASE_URL=https://plruuzubfulccriopggs.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SUPABASE_BUCKET=listing-images
    networks:
      - marketplace-net

  order-service:
    build: ./services/order-service
    container_name: order-service
    ports:
      - "8003:8003"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./services/order-service:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - PORT=8003
      - IDENTITY_URL=https://identity-service.blackmeadow-879b6e0b.southeastasia.azurecontainerapps.io
      - LISTING_URL=http://listing-service:8002
      - COMPLIANCE_URL=http://compliance-service:8004
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=order-service
      - SUPABASE_URL=https://plruuzubfulccriopggs.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
    networks:
      - marketplace-net

  compliance-service:
    build: ./services/compliance-service
    container_name: compliance-service
    ports:
      - "8004:8004"
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./services/compliance-service:/app
      - /app/node_modules
    command: npm run dev
    environment:
      - PORT=8004
      - IDENTITY_URL=https://identity-service.blackmeadow-879b6e0b.southeastasia.azurecontainerapps.io
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_CLIENT_ID=compliance-service
      - SUPABASE_URL=https://plruuzubfulccriopggs.supabase.co
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
    networks:
      - marketplace-net

networks:
  marketplace-net:
    driver: bridge
