name: Trigger auto deployment for identity-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/identity-service-AutoDeployTrigger-7b67e5df-7c37-4506-8b2f-b4f4a9a95f5c.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.IDENTITYSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.IDENTITYSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.IDENTITYSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.IDENTITYSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.IDENTITYSERVICE_REGISTRY_PASSWORD }}
          containerAppName: identity-service
          resourceGroup: pet-marketplace
          imageToBuild: ghcr.io/identity-service:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


