name: compliance-service — CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/services/compliance-service/**"
      - ".github/workflows/compliance-service.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/services/compliance-service/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ${{ secrets.AZURE_ACR_REGISTRY_URL_COMPLIANCE }}
  IMAGE_PREFIX: exotic-pet-marketplace
  SERVICE: compliance-service

jobs:
  # Job 1: Install & Audit
  audit:
    name: Install & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: backend/services/compliance-service
        run: npm install

      - name: npm audit
        working-directory: backend/services/compliance-service
        run: npm audit --audit-level=high
        continue-on-error: true

  # Job 2: Snyk Security Scan
  security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: backend/services/compliance-service
        run: npm install

      - name: Run Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/services/compliance-service/package.json --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk report
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

  # Job 3: Build & Push to ACR
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [audit, security-scan]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        run: |
          echo "${{ secrets.AZURE_ACR_PASSWORD_COMPLIANCE }}" | docker login -u "${{ secrets.AZURE_ACR_USERNAME_COMPLIANCE }}" --password-stdin "${{ env.REGISTRY }}"

      - name: Build and Push to ACR
        run: |
          docker build -t "${{ env.REGISTRY }}/exotic-pet-marketplace-compliance-service:latest" \
                       -t "${{ env.REGISTRY }}/exotic-pet-marketplace-compliance-service:${{ github.sha }}" \
                       backend/services/compliance-service
          docker push "${{ env.REGISTRY }}/exotic-pet-marketplace-compliance-service:latest"
          docker push "${{ env.REGISTRY }}/exotic-pet-marketplace-compliance-service:${{ github.sha }}"

  # Job 4: Deploy to Azure Container Apps
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          tenant-id: ${{ secrets.AZURE_TENANT_ID_COMPLIANCE }}
          client-id: ${{ secrets.AZURE_CLIENT_ID_COMPLIANCE }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID_COMPLIANCE }}

      - name: Update Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp update \
              --name compliance-service \
              --resource-group ${{ secrets.AZURE_RESOURCE_GROUP_COMPLIANCE }} \
              --image ${{ env.REGISTRY }}/exotic-pet-marketplace-compliance-service:latest \
              --set-env-vars "BUILD_ID=${{ github.run_id }}" "BUILD_SHA=${{ github.sha }}"



