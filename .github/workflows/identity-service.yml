name: identity-service — CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "backend/services/identity-service/**"
      - ".github/workflows/identity-service.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/services/identity-service/**"

permissions:
  contents: read
  packages: write
  security-events: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: exotic-pet-marketplace
  SERVICE: identity-service

jobs:
  # Job 1: Install & Audit
  audit:
    name: Install & Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: backend/services/identity-service
        run: npm install

      - name: npm audit
        working-directory: backend/services/identity-service
        run: npm audit --audit-level=high
        continue-on-error: true

  # Job 2: Snyk Security Scan
  security-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: audit
    steps:
      - uses: actions/checkout@v4

      - name: Run Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --file=backend/services/identity-service/package.json --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload Snyk report
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        if: always() && hashFiles('snyk.sarif') != ''
        with:
          sarif_file: snyk.sarif

  # Job 3: Build & Push to GHCR
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [audit, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set lower-case owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend/services/${{ env.SERVICE }}
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_PREFIX }}-${{ env.SERVICE }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_PREFIX }}-${{ env.SERVICE }}:${{ github.sha }}

  # Job 4: Deploy to Azure Container Apps
  deploy:
    name: Deploy to Azure
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set lower-case owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name identity-service \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_PREFIX }}-${{ env.SERVICE }}:${{ github.sha }} \
            --registry-server ${{ env.REGISTRY }} \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GHCR_PAT }}


