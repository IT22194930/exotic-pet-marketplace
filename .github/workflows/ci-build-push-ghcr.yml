name: Build & Push Docker Images to GHCR

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: exotic-pet-marketplace

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env file for CI
        run: |
          cat > backend/.env << 'EOF'
          JWT_SECRET=ci-secret
          SUPABASE_URL=https://example.supabase.co
          SUPABASE_SERVICE_ROLE_KEY=dummy
          SUPABASE_BUCKET=listing-images
          EOF
      - name: Start compose
        working-directory: backend
        run: docker compose up -d --build
      - name: Wait
        run: sleep 10
      - name: Health checks
        run: |
          curl -f http://localhost:8001/health
          curl -f http://localhost:8002/health
          curl -f http://localhost:8003/health
          curl -f http://localhost:8004/health
      - name: Down
        if: always()
        working-directory: backend
        run: docker compose down

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - identity-service
          - listing-service
          - order-service
          - compliance-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lower-case owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./backend/services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:${{ github.sha }}